<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Bank Sampah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .register-card {
            width: 100%;
            max-width: 460px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .register-header {
            background-color: #212529;
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 24px;
            text-align: center;
        }
        .register-body {
            padding: 28px;
            background: white;
            border-radius: 0 0 12px 12px;
        }
        .btn-register {
            background-color: #212529;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-register:hover {
            background-color: #343a40;
            color: white;
        }
        .form-control:focus {
            border-color: #212529;
            box-shadow: 0 0 0 0.2rem rgba(33,37,41,0.15);
        }
    </style>
</head>
<body>
<div class="register-card">
    <div class="register-header">
        <div style="font-size: 2.5rem;">🗑️</div>
        <h4 class="mt-2 mb-0 fw-bold">Daftar Akun Warga</h4>
        <small class="opacity-75">Sistem Bank Sampah</small>
    </div>
    <div class="register-body">

        <!-- Alert error -->
        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form action="/register" method="post">

            <p class="fw-semibold text-muted small mb-3">Data Pribadi</p>

            <div class="mb-3">
                <label class="form-label fw-semibold">Nama Lengkap</label>
                <input type="text" name="nama" class="form-control"
                       placeholder="Masukkan nama lengkap" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Alamat</label>
                <textarea name="alamat" class="form-control" rows="2"
                          placeholder="Masukkan alamat" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">No. HP</label>
                <input type="text" name="noHp" class="form-control"
                       placeholder="08xxxxxxxxxx" required>
            </div>

            <hr>
            <p class="fw-semibold text-muted small mb-3">Data Akun</p>

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Buat username unik" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Buat password" required>
            </div>

            <button type="submit" class="btn btn-register w-100">Daftar Sekarang</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Sudah punya akun?
                <a href="/login" class="text-dark fw-semibold">Login di sini</a>
            </small>
        </div>
    </div>
</div>
</body>
</html>
