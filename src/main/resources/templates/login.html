 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Bank Sampah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-header {
            background-color: #212529;
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 28px;
            text-align: center;
        }
        .login-body {
            padding: 32px;
            background: white;
            border-radius: 0 0 12px 12px;
        }
        .btn-login {
            background-color: #212529;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-login:hover {
            background-color: #343a40;
            color: white;
        }
        .form-control:focus {
            border-color: #212529;
            box-shadow: 0 0 0 0.2rem rgba(33,37,41,0.15);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #adb5bd;
            font-size: 0.8rem;
            margin: 16px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dee2e6;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div style="font-size: 2.5rem;">🗑️</div>
        <h4 class="mt-2 mb-0 fw-bold">Sistem Bank Sampah</h4>
        <small class="opacity-75">Silakan login untuk melanjutkan</small>
    </div>
    <div class="login-body">

        <!-- Alert error -->
        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
        <!-- Alert logout -->
        <div th:if="${logout}" class="alert alert-secondary py-2 small" th:text="${logout}"></div>
        <!-- Alert register berhasil -->
        <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Masukkan username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-login w-100">Masuk</button>
        </form>

        <div class="divider">atau</div>

        <a href="/register" class="btn btn-outline-dark w-100">
            Daftar Akun
        </a>

    </div>
</div>
</body>
</html>
